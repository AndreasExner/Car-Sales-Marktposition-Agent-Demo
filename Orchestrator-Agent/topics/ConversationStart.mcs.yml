mcs.metadata:
  componentName: Start der Unterhaltung
  description: Dieses Systemthema wird ausgelöst, wenn der Agent eine Aktivität empfängt, die auf den Beginn einer neuen Unterhaltung hindeutet. Wenn Sie nicht möchten, dass der Agent die Unterhaltung beginnt, deaktivieren Sie dieses Thema.
kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: sendMessage_M0LuhV
      activity: |-
        Willkommen beim Car Sales Marktpositions-Agenten!

        Ich erstelle detaillierte Marktpositions-Berichte für PKW-Modelle. So funktioniert's:

        Nennen Sie mir ein **Fahrzeugmodell** (z.B. "Audi Q6 e-tron")
        1. Nennen Sie den **Zielmarkt** als Land (z.B. "Deutschland" oder "DE")
        2. Ich ermittle die meistverkaufte Variante und die Top-Wettbewerber
        3. Parallele Recherche-Module analysieren:
            - 🏷️ Preis-Leistungs-Verhältnis
            - 🔧 Zuverlässigkeit & Qualität
            - 🛡️ Sicherheit
            - 💡 Technologie & Ausstattung
            - 💰 Gesamtbetriebskosten (TCO)

        Nach ca. 5–10 Minuten erhalten Sie einen konsolidierten Management-Report.

    - kind: SendActivity
      id: sendActivity_yp3u4t
      activity: Welches **Fahrzeugmodell** möchten Sie anaylsieren? Und für welchen Markt (**Land)?** Soll ich das **aktuellste Modelljahr** wählen oder möchten sie ein Jahr vorgeben?