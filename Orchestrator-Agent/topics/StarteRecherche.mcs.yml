mcs.metadata:
  componentName: Recherchen delegieren
kind: AdaptiveDialog
inputs:
  - kind: AutomaticTaskInput
    propertyName: Variante
    description: Die meistverkaufte Ausstattung / Motorisierung des Fahrzeugmodells
    shouldPromptUser: true

  - kind: AutomaticTaskInput
    propertyName: Wettbewerber
    description: 3–5 direkte Konkurrenten im selben Segment und Markt
    shouldPromptUser: true

  - kind: AutomaticTaskInput
    propertyName: Fahrzeugmodell
    description: Exakte Modellbezeichnung, angegeben vom Benutzer
    shouldPromptUser: true

  - kind: AutomaticTaskInput
    propertyName: Modelljahr
    description: Aktuelles oder spezifiziertes Jahr
    shouldPromptUser: true

  - kind: AutomaticTaskInput
    propertyName: Markt
    description: Es wird ein einzelnes Land als ISO-Ländercode benötigt (z.B. DE, US, UK, CN)
    shouldPromptUser: true

modelDisplayName: Recherchen delegieren
modelDescription: |-
  Rufe den Flow CarSalesMarktpositionFlow auf. Der Flow erhält: Fahrzeugmodell, Markt, Variante, Wettbewerber, Modelljahr und die aktuelle Conversation ID.

  Der Flow startet 5 parallele Recherchen und wartet auf deren Abschluss.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: SendActivity
      id: sendActivity_ladz0R
      activity: |-
        Recherche gestartet: {Topic.Fahrzeugmodell} im Markt {Topic.Markt}
        - Variante: {Topic.Variante}
        - Modelljahr: {Topic.Modelljahr}
        - Wettbewerber: {Topic.Wettbewerber}

        Die 5 Recherche-Module arbeiten parallel:
        1. ⬜ Preis-Leistungs-Verhältnis
        2. ⬜ Zuverlässigkeit & Qualität
        3. ⬜ Sicherheit
        4. ⬜ Technologie & Ausstattung
        5. ⬜ Gesamtbetriebskosten (TCO)

        Geschätzte Dauer: 3–8 Minuten. Bitte warten Sie auf die Bestätigung.

    - kind: InvokeFlowAction
      id: invokeFlowAction_Gc45HJ
      input:
        binding:
          text: =Topic.Fahrzeugmodell
          text_1: =Topic.Markt
          text_2: =Topic.Variante
          text_3: =Topic.Wettbewerber
          text_4: =System.Conversation.Id

      output:
        binding:
          result: Topic.RechercheStatus

      flowId: 0f715a0a-8218-f111-8341-000d3a37e7da

    - kind: ConditionGroup
      id: conditionGroup_UtbM0J
      conditions:
        - id: conditionItem_RjdHbw
          condition: =Topic.RechercheStatus = "Completed"
          actions:
            - kind: SendActivity
              id: sendActivity_jyImX4
              activity: ✅ Alle 5 Module der Recherche konnte erfolgreich abgeschlossen werden. Ich werde jetzt mit der Erstellung des Berichts beginnen. Dies kann ein par Minuten dauern.

      elseActions:
        - kind: SendActivity
          id: sendActivity_im5zFO
          activity: ⬜ Die Recherche dauert ungewöhnlich lange. Es liegen nocht nicht alle Ergebnisse vor. Bitte fragen sie in ein par Minuten noch einmal nach.

inputType:
  properties:
    Fahrzeugmodell:
      displayName: Fahrzeugmodell
      description: Exakte Modellbezeichnung, angegeben vom Benutzer
      type: String

    Markt:
      displayName: Markt
      description: Es wird ein einzelnes Land als ISO-Ländercode benötigt (z.B. DE, US, UK, CN)
      type: String

    Modelljahr:
      displayName: Modelljahr
      description: Aktuelles oder spezifiziertes Jahr
      type: String

    Variante:
      displayName: Variante
      description: Die meistverkaufte Ausstattung / Motorisierung des Fahrzeugmodells
      type: String

    Wettbewerber:
      displayName: Wettbewerber
      description: 3–5 direkte Konkurrenten im selben Segment und Markt
      type: String

outputType:
  properties:
    RechercheStatus:
      displayName: RechercheStatus
      description: Status der abgeschlossenen Recherche
      type: String