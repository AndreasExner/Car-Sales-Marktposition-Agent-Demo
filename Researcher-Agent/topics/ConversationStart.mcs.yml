mcs.metadata:
  componentName: Start der Unterhaltung
  description: Dieses Systemthema wird ausgelöst, wenn der Agent eine Aktivität empfängt, die auf den Beginn einer neuen Unterhaltung hindeutet. Wenn Sie nicht möchten, dass der Agent die Unterhaltung beginnt, deaktivieren Sie dieses Thema.
kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: sendMessage_M0LuhV
      activity:
        text:
          - "Hallo, ich bin {System.Bot.Name}, ein virtueller Assistent. Nur damit Sie es wissen: Manchmal nutze ich KI, um Ihre Fragen zu beantworten. Wenn Sie bei der Erstellung eine Website bereitgestellt haben, fragen Sie mich danach! Versuchen Sie als Nächstes, mir etwas mehr Wissen zu vermitteln, indem Sie generative KI einrichten."
        speak:
          - Hallo und vielen Dank, dass Sie {System.Bot.Name} anrufen. Beachten Sie, dass einige Antworten von KI generiert werden und möglicherweise auf ihre Genauigkeit überprüft werden müssen. Wie kann ich Ihnen heute helfen?